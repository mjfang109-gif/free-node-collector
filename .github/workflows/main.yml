name: Free-Node-Collector

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时运行一次
  workflow_dispatch:         # 支持手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 设置 Go（用于 clash-speedtest）
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: 安装 clash-speedtest
        run: |
          go install github.com/faceair/clash-speedtest@latest
          echo "$(~/go/bin)" >> $GITHUB_PATH
          clash-speedtest -h 2>&1 || true

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt -q

      - name: 运行采集 + 测速 + 生成订阅
        run: python -m src.main

      - name: 显示生成的文件
        run: |
          echo "=== dist 目录内容 ==="
          ls -lh dist/ || echo "dist 目录为空或不存在"

      - name: 提交更新
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add dist/
          git diff --staged --quiet && echo "✅ 无变更，跳过提交" || \
            (git commit -m "🚀 自动更新节点 $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
