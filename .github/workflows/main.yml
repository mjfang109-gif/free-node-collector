name: 自动抓取节点

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  collect-nodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      # --- 新增：下载并配置 Clash 内核 ---
      - name: Download and Setup Clash Kernel (mihomo)
        run: |
          # 1. 定义内核版本和下载 URL
          MIHOMO_VERSION="v1.18.0"
          MIHOMO_URL="https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          
          # 2. 下载内核
          echo "Downloading mihomo kernel from ${MIHOMO_URL}"
          curl -sL -o mihomo.gz "${MIHOMO_URL}"
          
          # 3. 解压
          gunzip mihomo.gz
          
          # 4. 移动到 /usr/local/bin 并重命名为 mihomo，使其在 PATH 中可被找到
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo
          
          # 5. 验证内核是否可用
          echo "Verifying mihomo kernel..."
          mihomo --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run collector
        run: |
          python src/main.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add -f dist/
          if ! git diff --staged --quiet; then
            git commit -m "📊 [Automated] Update subscription files"
            git push
          else
            echo "✅ No changes to commit."
          fi
