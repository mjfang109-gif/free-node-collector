name: 自动采集免费节点

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时运行一次
  workflow_dispatch:        # 支持手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      # ────────────────────────────────────────────────────────────
      # 关键步骤：安装 mihomo（Clash Meta）内核
      # 没有这个内核，测速只能做 TCP 握手，无法验证代理协议真正可用，
      # 导致生成的订阅节点在 Clash Verge 中全部显示 timeout！
      # ────────────────────────────────────────────────────────────
      - name: 安装 mihomo 内核
        run: |
          MIHOMO_VERSION="v1.19.10"
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            ARCH_NAME="amd64"
          elif [ "$ARCH" = "aarch64" ]; then
            ARCH_NAME="arm64"
          else
            ARCH_NAME="amd64"
          fi
          
          echo "正在下载 mihomo ${MIHOMO_VERSION} (${ARCH_NAME})..."
          wget -q "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-${ARCH_NAME}-${MIHOMO_VERSION}.gz" \
               -O mihomo.gz
          
          # 解压并赋予执行权限
          gzip -d mihomo.gz
          chmod +x mihomo
          
          # 移动到系统 PATH（确保 Python 能找到）
          sudo mv mihomo /usr/local/bin/mihomo
          
          # 验证安装
          echo "mihomo 版本："
          mihomo -v || echo "版本检测失败，但文件已安装"
          echo "✅ mihomo 安装完成"

      - name: 运行采集 + 测速 + 生成订阅
        run: python -m src.main
      - name: 提交更新到仓库
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add dist/
          git commit -m "🚀 自动更新节点 $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "没有新节点跳过提交"
          git push