name: 自动采集免费节点

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时运行一次
  workflow_dispatch:          # 支持手动触发

# 必须声明 write 权限，否则 git push 会 403
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 设置 Go（用于编译安装 clash-speedtest）
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: false   # 不缓存 Go module，避免偶发缓存损坏

      - name: 安装 clash-speedtest
        run: |
          go install github.com/faceair/clash-speedtest@latest
          # 打印完整帮助，便于确认实际支持的参数名
          echo "=== clash-speedtest flags ==="
          ~/go/bin/clash-speedtest -h 2>&1 || true
          echo "=============================="

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 运行采集 + 测速 + 生成订阅
        run: python -m src.main

      - name: 提交更新到仓库
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add dist/
          # 只有真正有变更时才提交，避免空提交报错
          git diff --staged --quiet \
            && echo "✅ 无节点变化，跳过提交" \
            || (git commit -m "🚀 自动更新节点 $(date -u +'%Y-%m-%d %H:%M:%S UTC')" && git push)
