mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  default-nameserver:
  - 114.114.114.114
  - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
proxies:
- name: 'NodeHub more : | Warp 1'
  type: vless
  server: 188.114.97.6
  port: 443
  uuid: 1043634e-8d9d-4736-83fa-f14ddc9d464c
  tls: true
  network: ws
  sni: dfsuporte.garena.com.ex33r.eu.cc
  servername: dfsuporte.garena.com.ex33r.eu.cc
  ws-opts:
    path: /id-amz
    headers:
      Host: dfsuporte.garena.com.ex33r.eu.cc
- name: NodeHub VLESS-188
  type: vless
  server: 188.114.97.3
  port: 443
  uuid: fc965ad9-bdd7-4815-ad71-b39ec5972dc1
  tls: true
  network: ws
  sni: octopusss4.com
  servername: octopusss4.com
  ws-opts:
    path: /tsghdws
    headers:
      Host: octopusss4.com
proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - 'NodeHub more : | Warp 1'
  - NodeHub VLESS-188
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - 'NodeHub more : | Warp 1'
  - NodeHub VLESS-188
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - 'NodeHub more : | Warp 1'
  - NodeHub VLESS-188
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
