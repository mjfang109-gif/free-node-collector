proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub VLESS-104
  - NodeHub 🇫🇮 >>::FI
  - NodeHub VLESS-45
  - NodeHub 🇫🇮 >>::FI_1
  - NodeHub http://t.me/v2ray_configs_pools
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub VLESS-104
  - NodeHub 🇫🇮 >>::FI
  - NodeHub VLESS-45
  - NodeHub 🇫🇮 >>::FI_1
  - NodeHub http://t.me/v2ray_configs_pools
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub VLESS-104
  - NodeHub 🇫🇮 >>::FI
  - NodeHub VLESS-45
  - NodeHub 🇫🇮 >>::FI_1
  - NodeHub http://t.me/v2ray_configs_pools
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
