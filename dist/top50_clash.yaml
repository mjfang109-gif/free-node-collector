mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  default-nameserver:
  - 114.114.114.114
  - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
proxies:
- name: NodeHub VLESS-172
  type: vless
  server: 172.64.33.162
  port: 443
  uuid: c35050ce-01ab-45a9-91b8-54cec637d0a8
  tls: true
  network: ws
  sni: octopusss5.info
  servername: octopusss5.info
  ws-opts:
    path: /udfyfws
    headers:
      Host: octopusss5.info
- name: NodeHub VLESS-108
  type: vless
  server: 108.162.195.45
  port: 443
  uuid: 7270612b-49f6-4b04-999c-34d8263da767
  tls: true
  network: ws
  sni: picassooo.info
  servername: picassooo.info
  ws-opts:
    path: /aymdlws
    headers:
      Host: picassooo.info
- name: NodeHub VLESS-45
  type: vless
  server: 45.130.125.229
  port: 443
  uuid: c35050ce-01ab-45a9-91b8-54cec637d0a8
  tls: true
  network: ws
  sni: octopusss5.info
  servername: octopusss5.info
  ws-opts:
    path: /udfyfws
    headers:
      Host: octopusss5.info
- name: NodeHub VLESS-188
  type: vless
  server: 188.114.97.6
  port: 80
  uuid: dc8eccdb-ecfa-435f-9ac1-5dc4882e7b51
  tls: false
  network: ws
  ws-opts:
    path: /http
    headers:
      Host: de.vpnbase.net
proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub VLESS-172
  - NodeHub VLESS-108
  - NodeHub VLESS-45
  - NodeHub VLESS-188
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub VLESS-172
  - NodeHub VLESS-108
  - NodeHub VLESS-45
  - NodeHub VLESS-188
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub VLESS-172
  - NodeHub VLESS-108
  - NodeHub VLESS-45
  - NodeHub VLESS-188
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
