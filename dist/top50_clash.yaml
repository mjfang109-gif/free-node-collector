mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  default-nameserver:
  - 114.114.114.114
  - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
proxies:
- name: NodeHub VLESS-172
  type: vless
  server: 172.64.53.140
  port: 2087
  uuid: 77777777-8a3e-6666-b6d1-a9c5f0e8b3a2
  tls: true
  network: ws
  sni: fgnix832fx.fx6hsv0.ccwu.cc
  servername: fgnix832fx.fx6hsv0.ccwu.cc
  ws-opts:
    path: /
    headers:
      Host: fgnix832fx.fx6hsv0.ccwu.cc
- name: NodeHub VLESS-151
  type: vless
  server: 151.101.109.223
  port: 80
  uuid: cabbfe13-038b-4dbb-9c45-5079c829abfa
  tls: false
  network: ws
  ws-opts:
    path: /
    headers:
      Host: max-gb1.global.ssl.fastly.net
- name: NodeHub 🇩🇪 >>::DE
  type: vless
  server: 151.101.194.219
  port: 80
  uuid: cabbfe13-038b-4dbb-9c45-5079c829abfa
  tls: false
  network: ws
  ws-opts:
    path: /
    headers:
      Host: max-gb1.global.ssl.fastly.net
- name: NodeHub VLESS-63
  type: vless
  server: 63.141.128.8
  port: 443
  uuid: 5b6be23b-dff4-428f-8a60-4f11568abe12
  tls: true
  network: ws
  sni: sync.amordad.xyz
  servername: sync.amordad.xyz
  ws-opts:
    path: /api/v1/stream
    headers:
      Host: sync.amordad.xyz
proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub VLESS-172
  - NodeHub VLESS-151
  - NodeHub 🇩🇪 >>::DE
  - NodeHub VLESS-63
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub VLESS-172
  - NodeHub VLESS-151
  - NodeHub 🇩🇪 >>::DE
  - NodeHub VLESS-63
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub VLESS-172
  - NodeHub VLESS-151
  - NodeHub 🇩🇪 >>::DE
  - NodeHub VLESS-63
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
