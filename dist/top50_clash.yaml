- name: NodeHub By EbraSha 🦈
  type: vmess
  server: 104.21.55.229
  port: 80
  uuid: 65b17c0b-0a52-4b54-9bc9-60e31397b841
  alterId: 0
  cipher: auto
  tls: false
  network: ws
  ws-opts:
    path: /65b17c0b-0a52-4b54-9bc9-60e31397b841-vmess
    headers:
      Host: accklsj.bufu.us.ci
proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub VLESS-198
  - NodeHub VLESS-140
  - NodeHub VLESS-162
  - NodeHub By EbraSha 🦈
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub VLESS-198
  - NodeHub VLESS-140
  - NodeHub VLESS-162
  - NodeHub By EbraSha 🦈
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub VLESS-198
  - NodeHub VLESS-140
  - NodeHub VLESS-162
  - NodeHub By EbraSha 🦈
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
