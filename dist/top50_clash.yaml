mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  default-nameserver:
  - 114.114.114.114
  - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
proxies:
- name: NodeHub VLESS-198
  type: vless
  server: 198.41.223.229
  port: 443
  uuid: 1244a6b2-70e2-41fd-8997-97eebe3d2c61
  tls: true
  network: ws
  sni: accv9.mmhz9.workers.dev
  servername: accv9.mmhz9.workers.dev
  ws-opts:
    path: /
    headers:
      Host: accv9.mmhz9.workers.dev
- name: NodeHub VLESS-140
  type: vless
  server: 140.248.185.253
  port: 443
  uuid: 9a1ca418-134f-4750-b97a-55ea81135742
  tls: true
  network: ws
  sni: default.ssl.fastly.net
  servername: default.ssl.fastly.net
  ws-opts:
    path: /
    headers:
      Host: pan1.global.ssl.fastly.net
- name: NodeHub VLESS-162
  type: vless
  server: 162.159.38.119
  port: 443
  uuid: f7e3ff36-276c-4477-b6d4-47257500d869
  tls: true
  network: ws
  sni: pon.antalmani.mm.am
