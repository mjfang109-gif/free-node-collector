mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  default-nameserver:
  - 114.114.114.114
  - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
proxies:
- name: NodeHub VLESS-104
  type: vless
  server: 104.17.38.42
  port: 443
  uuid: 0905460d-6edc-4a82-8ec8-6b76090b41c8
  tls: true
  network: ws
  sni: nginx-f.pages.dev
  servername: nginx-f.pages.dev
  ws-opts:
    path: /?ed=2560fp=randomized
    headers:
      Host: nginx-f.pages.dev
- name: NodeHub VLESS-104_1
  type: vless
  server: 104.25.252.37
  port: 443
  uuid: a6f1755f-0140-4bea-8727-0db1bed7c4df
  tls: true
  network: ws
  sni: juzi.qea.ccwu.cc
  servername: juzi.qea.ccwu.cc
  ws-opts:
    path: /
    headers:
      Host: juzi.qea.ccwu.cc
- name: NodeHub >>::XX
  type: vless
  server: 162.159.18.105
  port: 443
  uuid: a6f1755f-0140-4bea-8727-0db1bed7c4df
  tls: true
  network: ws
  sni: juzi.qea.ccwu.cc
  servername: juzi.qea.ccwu.cc
  ws-opts:
    path: /
    headers:
      Host: juzi.qea.ccwu.cc
- name: NodeHub >>::XX_1
  type: vless
  server: 104.25.242.61
  port: 443
  uuid: a6f1755f-0140-4bea-8727-0db1bed7c4df
  tls: true
  network: ws
  sni: juzi.qea.ccwu.cc
  servername: juzi.qea.ccwu.cc
  ws-opts:
    path: /
    headers:
      Host: juzi.qea.ccwu.cc
proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub VLESS-104
  - NodeHub VLESS-104_1
  - NodeHub >>::XX
  - NodeHub >>::XX_1
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub VLESS-104
  - NodeHub VLESS-104_1
  - NodeHub >>::XX
  - NodeHub >>::XX_1
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub VLESS-104
  - NodeHub VLESS-104_1
  - NodeHub >>::XX
  - NodeHub >>::XX_1
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
