- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub 🇺🇸 >>::US
  - NodeHub 🇩🇪 >>::DE
  - NodeHub By EbraSha
  - NodeHub By EbraSha_1
  - NodeHub VLESS-172
  - 'NodeHub Channel id: `'
- name: NodeHub - 🔮 故障转移
