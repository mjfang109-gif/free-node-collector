proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub VLESS-104
  - NodeHub VLESS-172
  - NodeHub VLESS-162
  - NodeHub 🇫🇮 >>::FI
  - NodeHub چنل‌تلگراممون
  - NodeHub VLESS-199
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub VLESS-104
  - NodeHub VLESS-172
  - NodeHub VLESS-162
  - NodeHub 🇫🇮 >>::FI
  - NodeHub چنل‌تلگراممون
  - NodeHub VLESS-199
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub VLESS-104
  - NodeHub VLESS-172
  - NodeHub VLESS-162
  - NodeHub 🇫🇮 >>::FI
  - NodeHub چنل‌تلگراممون
  - NodeHub VLESS-199
