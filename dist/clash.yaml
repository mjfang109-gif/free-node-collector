proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub 🇺🇸 >>::US
  - NodeHub 🇩🇪 >>::DE
  - NodeHub By EbraSha
  - NodeHub By EbraSha_1
  - NodeHub VLESS-172
