mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  default-nameserver:
  - 114.114.114.114
  - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
proxies:
- name: NodeHub VLESS-104
  type: vless
  server: 104.27.30.20
  port: 443
  uuid: 69d38faa-21a1-4d18-82cb-796a942c181b
  tls: true
  network: ws
  sni: sfsl.ardomains1.dpdns.org
  servername: sfsl.ardomains1.dpdns.org
  ws-opts:
    path: /?ed=2048security=tls
    headers:
      Host: sfsl.ardomains1.dpdns.org
- name: NodeHub VLESS-89
  type: vless
  server: 89.116.46.68
  port: 443
  uuid: fc965ad9-bdd7-4815-ad71-b39ec5972dc1
  tls: true
  network: ws
  sni: octopusss4.com
  servername: octopusss4.com
  ws-opts:
    path: /tsghdws
    headers:
      Host: octopusss4.com
- name: NodeHub By EbraSha ⌨
  type: vmess
  server: 104.21.55.229
  port: 80
  uuid: 65b17c0b-0a52-4b54-9bc9-60e31397b841
  alterId: 0
  cipher: auto
  tls: false
  network: ws
  ws-opts:
    path: /65b17c0b-0a52-4b54-9bc9-60e31397b841-vmess
    headers:
      Host: accklsj.bufu.us.ci
proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub VLESS-104
  - NodeHub VLESS-89
  - NodeHub By EbraSha ⌨
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub VLESS-104
  - NodeHub VLESS-89
  - NodeHub By EbraSha ⌨
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub VLESS-104
  - NodeHub VLESS-89
  - NodeHub By EbraSha ⌨
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
