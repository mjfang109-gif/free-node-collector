mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  default-nameserver:
  - 114.114.114.114
  - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
proxies:
- name: NodeHub 🇺🇸 >>::US
  type: vless
  server: 104.17.156.197
  port: 443
  uuid: a6f1755f-0140-4bea-8727-0db1bed7c4df
  tls: true
  network: ws
  sni: juzi.qea.ccwu.cc
  servername: juzi.qea.ccwu.cc
  ws-opts:
    path: /
    headers:
      Host: juzi.qea.ccwu.cc
- name: NodeHub VLESS-104
  type: vless
  server: 104.19.58.194
  port: 443
  uuid: 06b65903-406d-4a41-8463-6fd5c0ee7798
  tls: true
  network: ws
  sni: sni.skylee4.cloudns.ch
  servername: sni.skylee4.cloudns.ch
  ws-opts:
    path: /fp=chrome
    headers:
      Host: sni.skylee4.cloudns.ch
- name: NodeHub 🇺🇸 >>::US_1
  type: vless
  server: 162.159.13.206
  port: 443
  uuid: a6f1755f-0140-4bea-8727-0db1bed7c4df
  tls: true
  network: ws
  sni: juzi.qea.ccwu.cc
  servername: juzi.qea.ccwu.cc
  ws-opts:
    path: /
    headers:
      Host: juzi.qea.ccwu.cc
- name: NodeHub VLESS-104_1
  type: vless
  server: 104.18.139.67
  port: 443
  uuid: c2f0a8f0-36fe-4a94-824b-bca271ca642b
  tls: true
  network: ws
  sni: alphacdn.alphashops.shop
  servername: alphacdn.alphashops.shop
  ws-opts:
    path: /ws
    headers:
      Host: alphacdn.alphashops.shop
- name: NodeHub Tel---3
  type: vless
  server: 172.64.147.255
  port: 80
  uuid: 478cc26d-16b3-4fdd-be64-60d5a58c1622
  tls: false
  network: ws
  ws-opts:
    path: /
    headers:
      Host: tt.andishehparenting.com
proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub 🇺🇸 >>::US
  - NodeHub VLESS-104
  - NodeHub 🇺🇸 >>::US_1
  - NodeHub VLESS-104_1
  - NodeHub Tel---3
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub 🇺🇸 >>::US
  - NodeHub VLESS-104
  - NodeHub 🇺🇸 >>::US_1
  - NodeHub VLESS-104_1
  - NodeHub Tel---3
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub 🇺🇸 >>::US
  - NodeHub VLESS-104
  - NodeHub 🇺🇸 >>::US_1
  - NodeHub VLESS-104_1
  - NodeHub Tel---3
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
