mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  default-nameserver:
  - 114.114.114.114
  - 8.8.8.8
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
  - https://doh.pub/dns-query
  - https://dns.alidns.com/dns-query
  fallback:
  - https://1.1.1.1/dns-query
  - https://8.8.8.8/dns-query
proxies:
- name: NodeHub VLESS-216
  type: vless
  server: 216.24.57.1
  port: 443
  uuid: 1a5b24bc-6180-4fa7-922d-ba7ee8a7a2b7
  tls: true
  network: ws
  sni: support.zoom.us.cyylr.eu.cc
  servername: support.zoom.us.cyylr.eu.cc
  ws-opts:
    path: /id-pusat
    headers:
      Host: support.zoom.us.cyylr.eu.cc
- name: NodeHub VLESS-104
  type: vless
  server: 104.16.254.231
  port: 443
  uuid: 06b65903-406d-4a41-8463-6fd5c0ee7798
  tls: true
  network: ws
  sni: sni.skylee4.cloudns.ch
  servername: sni.skylee4.cloudns.ch
  ws-opts:
    path: /fp=chrome
    headers:
      Host: sni.skylee4.cloudns.ch
- name: NodeHub VLESS-188
  type: vless
  server: 188.114.97.6
  port: 443
  uuid: 15a8fadd-3a43-422f-8e63-a87ea7c13221
  tls: true
  network: ws
  sni: blog.webex.com.cyylr.eu.cc
  servername: blog.webex.com.cyylr.eu.cc
  ws-opts:
    path: /id-tksi
    headers:
      Host: blog.webex.com.cyylr.eu.cc
proxy-groups:
- name: NodeHub - 🚀 节点选择
  type: select
  proxies:
  - NodeHub - ♻️ 自动选择
  - NodeHub - 🔮 故障转移
  - DIRECT
  - NodeHub VLESS-216
  - NodeHub VLESS-104
  - NodeHub VLESS-188
- name: NodeHub - ♻️ 自动选择
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 300
  tolerance: 50
  proxies: &id001
  - NodeHub VLESS-216
  - NodeHub VLESS-104
  - NodeHub VLESS-188
- name: NodeHub - 🔮 故障转移
  type: fallback
  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🐌 低速节点
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub VLESS-216
  - NodeHub VLESS-104
  - NodeHub VLESS-188
rules:
- DOMAIN-SUFFIX,google.com,🚀 节点选择
- DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
- DOMAIN-SUFFIX,github.com,🚀 节点选择
- DOMAIN-SUFFIX,youtube.com,🚀 节点选择
- DOMAIN-KEYWORD,telegram,🚀 节点选择
- DOMAIN-KEYWORD,openai,🚀 节点选择
- GEOIP,LAN,DIRECT
- GEOIP,CN,DIRECT
- MATCH,NodeHub - 🚀 节点选择
