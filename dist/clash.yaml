  url: http://www.gstatic.com/generate_204
  interval: 300
  proxies: *id001
- name: NodeHub - 🌍 DE
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
  - NodeHub 🇩🇪 >>::DE
- name: NodeHub - 🌍 US
  type: select
  proxies:
  - NodeHub - 🚀 节点选择
